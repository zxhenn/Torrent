services:
  docker-leecher:
    build: .
    command:
      - leech
      - torrents/hello.txt.mtorrent
      - --output
      - downloads/hello-docker.txt
      - --tracker
      - http://host.docker.internal:8000
      - --host
      - 127.0.0.1
      - --listen-host
      - 0.0.0.0
      - --port
      - "9002"
      - --peer-id
      - docker-leecher
    ports:
      - "9002:9002"
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tty: true
